<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - ShopEasy</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Navigation -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <a href="index.html" class="logo">
                    <i class="fas fa-shopping-bag"></i>
                    <span>ShopEasy</span>
                </a>

                <div class="nav-menu">
                    <ul class="nav-links">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="products.html" class="active">Products</a></li>
                        <li><a href="#">Categories</a></li>
                        <li><a href="cart.html" class="cart-link-mobile">Cart</a></li>
                    </ul>
                    
                    <div class="nav-actions">
                        <a href="cart.html" class="cart-icon">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="cart-count">0</span>
                        </a>
                    </div>
                </div>

                <button class="mobile-menu-btn">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
        </nav>
    </header>

    <!-- Products Page -->
    <main class="products-page">
        <div class="container">
            <div class="page-header">
                <h1>All Products</h1>
                <p>Discover our collection</p>
            </div>
            
            <!-- Filters -->
            <div class="filters">
                <select id="category-filter" class="filter-select">
                    <option value="">All Categories</option>
                    <option value="electronics">Electronics</option>
                    <option value="fashion">Fashion</option>
                    <option value="home">Home & Living</option>
                </select>
                <select id="sort-by" class="filter-select">
                    <option value="default">Sort By</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                </select>
            </div>
            
            <!-- Products Grid -->
            <div class="products-grid" id="products-grid">
                <!-- Products loaded by JavaScript -->
            </div>
            
            <!-- Loading -->
            <div class="loading" id="products-loading">
                Loading products...
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <h3>ShopEasy</h3>
                    <p>Quality products at affordable prices.</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <ul>
                        <li><a href="index.html">Home</a></li>
                        <li><a href="products.html">Products</a></li>
                        <li><a href="cart.html">Cart</a></li>
                    </ul>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2024 ShopEasy. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Load all products
            if (typeof displayAllProducts === 'function') {
                displayAllProducts();
            }
            
            // Setup filters
            const categoryFilter = document.getElementById('category-filter');
            const sortBy = document.getElementById('sort-by');
            
            if (categoryFilter) {
                categoryFilter.addEventListener('change', function() {
                    if (typeof filterProducts === 'function') {
                        filterProducts(this.value, sortBy.value);
                    }
                });
            }
            
            if (sortBy) {
                sortBy.addEventListener('change', function() {
                    if (typeof filterProducts === 'function') {
                        filterProducts(categoryFilter.value, this.value);
                    }
                });
            }
        });
    </script>
</body>
</html>
